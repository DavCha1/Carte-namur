var map = L.map('map').setView([50.5, 4.5], 8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var markers = L.markerClusterGroup();
map.addLayer(markers);

function getIcon(type) {
  let iconFile = "castle.png";
  if (type === "restaurant") iconFile = "food.png";
  if (type === "museum") iconFile = "museum.png";

  return L.icon({
    iconUrl: "icons/" + iconFile,
    iconSize: [40, 40]
  });
}

function displayData(data) {
  markers.clearLayers();

  L.geoJSON(data, {
    pointToLayer: function (feature, latlng) {
      let type = feature.properties.type || "historic";
      return L.marker(latlng, { icon: getIcon(type) });
    },
    onEachFeature: function (feature, layer) {
      let p = feature.properties;
      let popup = "<b>" + (p.name || "Lieu") + "</b>";
      if (p.story) popup += "<br><br>" + p.story;
      if (p.anecdote) popup += "<br><i>" + p.anecdote + "</i>";
      layer.bindPopup(popup);
    }
  }).addTo(markers);
}

function filterType(type) {
  let filtered = {
    type: "FeatureCollection",
    features: allData.features.filter(f => f.properties.type === type)
  };
  displayData(filtered);
}

function showAll() {
  displayData(allData);
}

function searchPlace() {
  let input = document.getElementById("searchBox").value.toLowerCase();

  let filtered = {
    type: "FeatureCollection",
    features: allData.features.filter(f =>
      f.properties.name && f.properties.name.toLowerCase().includes(input)
    )
  };

  displayData(filtered);
}

displayData(allData);

</script>
